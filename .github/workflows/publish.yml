name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            runner: windows-latest
          - rid: osx-x64
            runner: macos-latest
            target: x86_64-apple-darwin
          - rid: osx-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          - rid: linux-x64
            runner: ubuntu-latest
          - rid: linux-arm64
            runner: [self-hosted, linux, arm64]

    runs-on: ${{ matrix.runner }}

    env:
      DOTNET_INSTALL_DIR: ${{ contains(join(matrix.runner, ','), 'self-hosted') && '/home/github-runner/dotnet' || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install macOS workload
        if: runner.os == 'macOS'
        run: dotnet workload install macos

      - name: Publish
        run: >
          dotnet publish LabelAva.csproj
          -r ${{ matrix.rid }}
          -c Release
          --self-contained
          -p:PublishAot=true

      - name: Create macOS .app bundle
        if: startsWith(matrix.rid, 'osx')
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          PUBLISH_DIR="bin/Release/net10.0/${{ matrix.rid }}/publish"
          APP_DIR="$PUBLISH_DIR/LabelAva.app"
          MACOS_DIR="$APP_DIR/Contents/MacOS"
          RESOURCES_DIR="$APP_DIR/Contents/Resources"

          mkdir -p "$MACOS_DIR" "$RESOURCES_DIR"

          cat > "$APP_DIR/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>LabelAva</string>
              <key>CFBundleDisplayName</key>
              <string>LabelAva</string>
              <key>CFBundleIdentifier</key>
              <string>icu.kurohoshi.labelava</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleExecutable</key>
              <string>LabelAva</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF

          find "$PUBLISH_DIR" -maxdepth 1 -type f -exec mv {} "$MACOS_DIR/" \;
          chmod +x "$MACOS_DIR/LabelAva"

      - uses: actions/upload-artifact@v4
        if: "!startsWith(matrix.rid, 'osx')"
        with:
          name: LabelAva-${{ matrix.rid }}
          path: bin/Release/net10.0/${{ matrix.rid }}/publish/

      - uses: actions/upload-artifact@v4
        if: startsWith(matrix.rid, 'osx')
        with:
          name: LabelAva-${{ matrix.rid }}
          path: bin/Release/net10.0/${{ matrix.rid }}/publish/LabelAva.app

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Zip each platform
        run: |
          VERSION="${{ github.ref_name }}"
          cd artifacts
          for dir in */; do
            zip -r "../${dir%/}-${VERSION}.zip" "$dir"
          done
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LabelAva ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true

          files: "*.zip"